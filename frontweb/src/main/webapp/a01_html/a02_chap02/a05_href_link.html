<!DOCTYPE html>

<body>
<!-- 
# 하이프링크
1. html에서 하이프링크는 웹페이지에서 다른 페이지로 이동하거나, 동일한 페이지
내의 다른 섹션으로 이동하거나, 다른 웹 사이트로 이동할 수 있도록 하는 링크를 말합니다.
하이프링크는 a 태그를 사용하여 생성됩니다. 이 태그는 앵크(anchor)의 약자로 사용됩니다.
2. 주요속성
	1) href : 하이프링크가 가리키는 대상의 url을 지정합니다. 이 속성을 필수입니다.
	2) target : 링크가 어디서 열릴지를 지정합니다. 예를 들어, 새탭에서 링크를
		열고 싶다면, _blank값을 사용합니다.
	3) rel : 현재 문서와 링크된 문서 사이의 관계를 명시합니다. 예를들어
		nofollow값을 사용하여 검색 엔진에서 링크를 따라가지 않도록 지정할 수
		있습니다.
	3) title : 링크에 대한 추가 정보를 제공하는 툴팁을 생성합니다.
		이 속성은 선택 사항입니다.
3. 기본 형식
	a href="이동할페이지" 속성="속성값		
 -->
	<h2>동일한 페이지 내의 다른 영역으로 이동하기</h2>
	<a href="#section1">영역 1로 이동</a>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<h2 id="section1">영역1로 오셨군요</h2> 

</body>
</html>
