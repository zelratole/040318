<!-- 
# 주소이동
1. 상대주소
	현재페이지를 기준으로 하위 폴드, 상위 폴드 등에
	있는 페이지로 이동하는 것을 말한다.
	1) 현재 페이지의 동일 폴드하위에 페이지는 페이지 그대로 사용하여 이동가능
	2) 하위 폴드에 있는 페이지는 
		href="폴드명/페이지명" 형식으로 이동한다.
	3) 상위 폴드에 있는 페이지는
		href="../페이지명" 형식으로 이동한다.
 -->
	<h2>상대주소로 페이지 호출</h2>
	<a href="../a01_chap01/a10_img.html">
		상위폴드에서 폴드명과 파일명으로 이동</a><br> 
		
<!-- 
2. 절대주소
	1) 내부웹서버
		(물리적 경로)frontweb\src\main\webapp\aaa.html
		(웹서버 경로)http://localhost:8080/frontweb/aaa.html
			==> a href="/frontweb/aaa.html"
		물리적 경로와 웹서버의 경로는 위 경우 동일한 위치이기때문에
		hyper link에서도 활용할 수 있다.	
	2) 외부웹서버(외부페이지)
 -->
	<a href="/frontweb/aaa.html">웹서버 절대 경로로 페이지 호출</a><br>
	<a href="/frontweb/a01_html/a01_chap01/a06_spec_tag.html">
