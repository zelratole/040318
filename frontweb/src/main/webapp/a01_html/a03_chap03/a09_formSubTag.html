<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<!-- 
# form하위의 여러가지 요소
1. 텍스트 입력
	1) input type="text"
		한줄짜리 입력창
	2) input type="password"
		암호입력창 : 사용자 입력 문자 대신 '*' 등 다른 글자로 출력
	3) textarea
		여러줄 입력창
2. 기본 형식
	input type="text|password"
		name="요소이름"
		maxlength="문자갯수(최대입력가능한)"
		size="문자갯수(보이는 문자갯수)"		
	    value="초기입력되는텍스트"
	    placeholder : 실제 입력되는 값이 아니라 설명을 위한 출력
 -->
기본입력:<input type="text"/><br>
최대 문자갯수 지정:<input type="text" maxlength="2"/><br>
보이는 문자갯수 지정:<input type="text" size="2" /><br>
보이는 문자갯수 지정:<input type="text" size="1" /><br>
초기 입력 데이터 지정:<input type="text" value="안녕"/><br>
설명내용:<input type="text" placeholder="여기에 입력(클릭해서 입력)"/><br>
<!-- 
ex) 위 속성값을 활용하여
구매할 물건정보(물건명, 가격, 갯수)를 선언하여 입력할 form을 구성해보세요.


 -->	 
 
 
 
 
</body>
</html>
