    <h1>이벤트 1: 2024년 4월 20일</h1>
    <p>이벤트에 대한 상세 설명이 여기에 포함됩니다. 참여 방법, 장소 등의 정보를 제공하세요.</p>
    <!-- iframe을 사용하여 이벤트 장소의 지도를 표시할 수 있습니다. 예시: -->
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3164.123456789012!2d127.12345678901234!3d37.12345678901234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1234567890123456%3A0x1234567890abcdef!2z7J247YOA7J207IucIOyXhuq9gOuhnCDslYrqtazrj5kg7IS47IKw66GcIDUw!5e0!3m2!1sko!2skr!4v1234567890123"
        width="600"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    <a href="events.html">이벤트 목록으로 돌아가기</a>
  	<!-- 
 이 iframe 태그는 웹 페이지 내에 Google 지도를 내장하는 데 사용됩니다. 여기에 명시된 속성들에 대해 자세히 설명드리겠습니다:

- `src="https://www.google.com/maps/embed?pb=..."`: 이 속성은 내장될 지도의 소스 URL을 지정합니다. URL에 포함된 매개변수(`pb`)는 지도의 위치, 확대/축소 레벨, 방향 등 지도를 표시하는 데 필요한 다양한 정보를 담고 있습니다.
- `width="600"`: iframe의 너비를 픽셀 단위로 지정합니다. 이 예제에서는 600픽셀로 설정되어 있습니다.
- `height="450"`: iframe의 높이를 픽셀 단위로 지정합니다. 이 예제에서는 450픽셀로 설정되어 있습니다.
- `style="border:0;"`: iframe에 대한 CSS 스타일을 지정합니다. 여기서는 `border:0;`로 설정되어 있어 iframe 주위에 테두리가 표시되지 않습니다.
- `allowfullscreen=""`: 이 속성은 사용자가 전체 화면 모드로 지도를 볼 수 있게 허용합니다. 값이 비어 있어도 속성의 존재만으로 활성화됩니다.
- `loading="lazy"`: 이 속성은 브라우저에게 페이지 로딩 시 iframe의 내용을 즉시 로드하지 않고 사용자가 스크롤하여 해당 iframe에 도달할 때까지 지연시키도록 지시합니다. 이는 페이지 로딩 성능을 향상시키는 데 도움이 됩니다.
- `referrerpolicy="no-referrer-when-downgrade"`: 이 속성은 브라우저에게 현재 페이지에서 iframe의 소스 페이지로 요청을 보낼 때 사용할 Referrer Policy를 지정합니다. `"no-referrer-when-downgrade"` 옵션은 현재 페이지가 HTTPS를 사용하고 iframe의 소스가 HTTP를 사용하는 경우를 제외하고, 일반적으로 브라우저가 Referrer 정보를 전송하도록 합니다.
이 태그를 사용하면, 지정된 소스 URL에 해당하는 Google 지도가 웹 페이지에 내장되어 사용자에게 표시됩니다. 지도는 지정된 너비와 높이로 표시되며, 필요에 따라 전체 화면 모드로 전환할 수 있습니다.

`referrerpolicy="no-referrer-when-downgrade"`라는 속성은 인터넷에서 다른 페이지로 이동할 때, 어디에서 왔는지를 알려주는 '소개장' 같은 역할을 합니다. 하지만 이 속성에는 특별한 규칙이 있어요.

예를 들어, 우리가 안전한 곳(HTTPS라고 하는 인터넷의 안전한 부분)에서 덜 안전한 곳(HTTP라고 하는 인터넷의 덜 안전한 부분)으로 이동할 때는, 우리가 어디에서 왔는지를 알려주지 않아요. 그래서 만약 우리가 안전한 인터넷 공간에서 노는 중이라면, 덜 안전한 곳으로 갈 때는 '소개장'을 주지 않는 거예요. 
그런데 만약 우리가 이미 덜 안전한 곳에 있거나, 같은 안전한 곳끼리 이동한다면 '소개장'을 계속 주고받을 수 있어요.

우리가 안전한 집에서 덜 안전한 밖으로 나갈 때는, 우리가 어디 집에서 왔는지를 밖에 있는 사람들에게 말하지 않아요. 
하지만 우리가 다른 안전한 집으로 가거나, 이미 밖에 있을 때는 어디에서 왔는지를 말할 수 있어요." 라고 할 수 있어요. 
이렇게 하면 우리 정보를 더 안전하게 지킬 수 있어요.
