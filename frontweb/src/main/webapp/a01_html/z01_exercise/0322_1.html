<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
 <title>회원가입 폼</title>
</head>
<body>
    <form>
        <label for="email">이메일:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password">비밀번호:</label>
        <input type="password" id="password" name="password" required><br>

        <label for="phone">휴대전화 번호:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" required placeholder="010-1234-5678"><br>

        <label>성별:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">남성</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">여성</label><br>

        <label for="dob">생년월일:</label>
        <input type="date" id="dob" name="dob" required><br>

        <input type="submit" value="가입하기">
    </form>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>개인 정보 수정 폼</title>
</head>
<body>
    <form>
        <label for="name">이름:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="email">이메일:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="interest">관심 분야:</label>
        <select id="interest" name="interest" multiple size="3">
            <option value="programming">프로그래밍</option>
            <option value="music">음악</option>
            <option value="travel">여행</option>
        </select><br>

        <input type="submit" value="정보 수정">
    </form>
</body>
</html>
