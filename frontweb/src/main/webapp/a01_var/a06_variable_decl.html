<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<h2>변수 선언 형식</h2>



</body>
<script type="text/javascript">
/* 
# 여러가지 변수 선언 형식
1. 자바스크립트는 여러가지 데이터 유형에 따라서 데이터를 할당하는
   변수명을 선언하고, 해당 변수명으로 다른 변수에 또 다시 할당하거나
   출력하는데 사용할 수 있다.
2. 변수 선언 형식
   1) var name = "홍길동"
   		문자열 데이터를 name이라는 변수에 할당 처리.
   		지역/전역변수 구분이 모호하다.
   		주로 전역변수로 사용할 때 활용한다.
   2) let age = 25
        숫자형 데이터를 age라는 변수에 할당 처리
        지역/전역변수를 명확히 구분할 때, 사용한다.
   3) const PI = 3.14
        한번 할당하면 변하지 않는 상수를 사용할 때,
        사용한다.
*/
	var name = "홍길동"
	document.write("이름은 :"+name+", ")
	let age = 25
	document.write("나이는 :"+age+", ")
	const PI = 3.14
	document.write("PI값 상수 :" + PI)
	var korPt = 70
	var engPt = 80
	var sum = korPt + engPt
	var avg = sum/2
	document.write("<br>")
	document.write("국어 점수:"+korPt+"<br>")
	document.write("영어 점수:"+engPt+"<br>")
	document.write("평균 점수:"+avg+"<br>")
	// f12을 이용해서 오타나 에러 확인해주세요..
	// ex) 과일명을 할당하는 변수, 가격을 할당하는 변수,
	//     구매한 갯수를 할당하는 변수를 선언하고,
	//     총비용을 출력하세요.. (변수명은 영문으로 선언하세요)
	let fruitName = "딸기"
	let price = 12000
	let cnt = 5
	let tot = price*cnt  // * 곱셈 처리 산술 연산자
	document.write("과일명 : "+ fruitName+"<br>")
	document.write("박스당 가격 : "+price+"원<br>")
	document.write("구매 박스 수 : "+cnt+"박스<br>")
	document.write("총비용 : "+tot+"원<br>")
	
	
	
	




</script>
</html>
