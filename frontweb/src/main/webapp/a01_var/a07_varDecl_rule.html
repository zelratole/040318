<script type="text/javascript">
/* 
# 변수는 식별자(identifier)로 식별하는 규칙을 지켜야지 정상적으로

1. 식별자 만드는 규칙
	1) 첫번째 문자는 알파벳, 언더스코어, $ 문자로만 사용할 수 있다.
		ex) 한글, 특수 문자, 숫자는 첫번째 변수 선언 문자로
		사용할 수 없다.
		var 과일 = "사과" (X)
		var 25Age = 30 (X)  
		var _num1 = 25 (O)
		var $loc = "서울" (O)
		var #nation = "대한민국" (X)
*/



</script>
