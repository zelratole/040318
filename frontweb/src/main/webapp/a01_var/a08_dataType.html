<script type="text/javascript">
/* 
# 데이터 유형

2. 종류
   1) 문자열
      string : "데이터", '데이터'
      ps) c, java  문자데이터유형 'A', 문자가 보여서 문자열 데이터 타입을

      var name = "홍길동"
      document.write("이름:"+name+"<br>")
      document.write("데이터유형:"+typeof(name))
      // typeof()라는 내장함수를 이용하여 어떤 유형인지를 나타낸다.
    	 
*/
var name = "홍길동"

/*
   2) 숫자형
