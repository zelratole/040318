<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<h2>기타데이터유형</h2>
</body>
<script type="text/javascript">
/* 
# 기타데이터 유형
3. boolean유형
	true/false의 진리값을 처리하는 데이터 유형을 말한다.
	비교연산자(==, >, <, >=, <=, !=) 결과로 두개의 숫자나
	문자열을 비교하여 진리값을 처리하여 그 결과를 할당하여 사용되는
	데이터 유형을 말한다.
	ex)
	var point = 80
	var isPass = point>=70
	// true 데이터가 isPass에 할당 처리된다.
	var age = 15
	var isAdult = age>=18
	// false 데이터가 isAdult에 할당 처리된다.
4. boolean 유형의 데이터는 주로 if(조건문), for(반복문)에서
	처리할 때, 활용할 때가 많다.
*/
var point = 80
var isPass = point>=70
document.write("점수:"+point+"<br>")
document.write("합격여부:"+isPass+"<br>")
var age = 15
var isAdult = age>=18
document.write("나이:"+age+"<br>")
document.write("성인여부:"+isAdult+"<br>")
// ex) 바나나의 가격(bananaPrice)을 할당한 후에, 
//    해당 바나나의 가격이 5000이상 일때는 isPriceOver
//     라는 변수가 true로 그외는 false로 할당되게 하세요..
var bananaPrice = 3000
var isPriceOver = bananaPrice>=5000
document.write("바나나의 가격:"+bananaPrice+"<br>")
document.write("바나나가 비싼지 여부:"+isPriceOver+"<br>")











</script>
</html>
