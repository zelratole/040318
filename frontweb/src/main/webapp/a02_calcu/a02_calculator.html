<!DOCTYPE html>

<meta charset="UTF-8">

<body>

	<h2>타이틀</h2>



</body>
<script type="text/javascript">
/* 
	3) 대입연산자 : 데이터를 특정 변수에 할당하는 연산자
		var num = 30  : 30이라는 데이터 = (기호-대입연산기호) 에 의해 num에 할당
		var plusNum = num + 5 : num에 있는 데이터에서 5를 더해서 plusNum에 
			대입연산자에 의해서 할당 된다.
		대입연산자는 흐름이 오른쪽에서 왼쪽 흘러 할당이 된다.
		var no1, no2, no3, no4;   // 변수를 한번에 선언
		no1 = no2 = no3 = no4 = 1;   //데이터1을 왼쪽방향을 계속 할당하여 전체
		변수가 1로 할당 처리 된다.
			
*/
var num = 30  // 기본 대입
var plusNum = num + 5  // 변수에 + 5를 해서 다시 대입
document.write("대입 연산 결과:"+plusNum)
// 한번에 선언
var no1, no2, no3, no4
no1 = no2 = no3 = no4 = 5
// 1을 왼쪽으로 흐름을 처리하면서 모두다 1로 할당.
document.write("한번에 할당된 변수들 no1:"+no1+"<br>")
document.write("no1:"+no1+"<br>")
document.write("no2:"+no2+"<br>")
document.write("no3:"+no3+"<br>")
document.write("no4:"+no4+"<br>")




/*
		증감대입연산자
		var no = 0
		no = no + 3   0 + 3,  no에는 3이 할당
		no = no + 3   3 + 3 no에는 기존 데이터 3과 추가 데이터 3을 합산해서 6을 할당된다.
		no += 3   위 내용을 축약해서 no 데이터에 추가로 3을 합산해서 총 9를 할당
		var oddCnt = 1
		oddCnt += 2    : oddCnt에 3
		oddCnt += 2    : oddCnt에 5 할당되어 있음..
		var cnt = 10
		cnt = cnt - 2   : 8
		cnt = cnt - 2   : 6
		cnt -= 2    : 4
		cnt -= 2    : 2
*/
var no = 0
no = no + 3; document.write("no 변수:"+no+"<br>") 
// 한라인에 여러 개 명령어를 처리할 때, ; 이용해서 구분하여 처리한다.
// 명령문1;명령문2;명령문3
no = no + 3; document.write("no 변수:"+no+"<br>")
no += 3; document.write("no 변수:"+no+"<br>"); no += 3;
document.write("no 변수:"+no+"<br>")
// 위 내용으로 누적하여 증감된 데이터를 확인할 수 있다.

/*
	4) 비교연산자 : 데이터끼리 비교하여 boolean의 결과를 가져오는 연산자
	
	
	
	5) 논리연산자 : 위 비교연산자를 2개이상으로 연결하여 논리합, 논리곱을 처리하는 연산자
		and, or
	6) 기타 : 삼항연산자 - 한라인에서 비교연산자에 대한 결과값을 처리할 수 있는 연산자

	
	
	
*/



</script>
</html>
