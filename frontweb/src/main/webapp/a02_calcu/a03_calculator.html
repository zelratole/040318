	<h2>비교 연산자/논리 연산자</h2>

<script type="text/javascript">
/*
	4) 비교연산자 : 데이터끼리 비교하여 boolean의 결과를 가져오는 연산자
		데이터1 == 데이터2  : 동일할 때, true
		데이터1 != 데이터2  : 같지 않을 때, true
		데이터1 >= 데이터2 : 숫자형으로 데이터1이 데이터2보다 크거나 같을 때, true
		데이터1 <= 데이터2 : 숫자형으로 데이터1이 데이터2보다 작거나 같을 때, true
		데이터1 > 데이터2 : 숫자형으로 데이터1이 데이터2보다 클 때, true
		데이터1 < 데이터2 : 숫자형으로 데이터2가 데이터1보다 클 때, true
		==> 조건문에서 분기 처리하거나, 반복문에서 반복 수행의 조건으로 처리할 때,
		활용된다.
*/
var num01 = 10; var num02 = 20;
document.write("num01 == num02 ? "+(num01 == num02 )+"<br>")
document.write("num01 != num02 ? "+ (num01 != num02 )+"<br>")
document.write("num01 >= num02 ? "+ (num01 >= num02 )+"<br>")
document.write("num01 <= num02 ? "+ (num01 <= num02 )+"<br>")
document.write("num01 > num02 ? "+ (num01 > num02 )+"<br>")
document.write("num01 < num02 ? " + (num01 < num02 )+"<br>")


/*
	5) 논리연산자 : 위 비교연산자를 2개이상으로 연결하여 논리합, 논리곱을 처리하는 연산자
		and, or
		예를 들어 아버지가 상을 주기로 했는 데, 국어/영어 점수 모두 다 80점이상이면
		최신 핸드폰을 사주기로 했을 때, 두 과목 다 80점이상이 필요할 때, and 조건으로
		처리한다.
		==> 비교조건1 && 비교조건2 : 비교조건1과 비교조건2가 모두 다 true일 때,
		true 그외는 false
		아버지가 마음이 바뀌어, 국어/영어 점수 둘 중에 하나만 80점이상이면
		ubs를 사주기로 했을 때, 두 과목 중에 하나만 80점이상이 필요할 때, or 조건으로
		처리한다.
		==> 비교조건1 || 비교조건2 : 비교조건1과 비교조건2 중에 하나 이상 true이면
		true 이고, 모두 다 false일 때만 false인 경우
*/		
var korPt = 90; var engPt = 75
var buyPhone = korPt>=80 && engPt>=80
var buyUsb = korPt>=80 || engPt >= 80
document.write("핸드폰을 살 수 있는 and 조건 : "+buyPhone+"<br>")
document.write("usb를 살 수 있는 or 조건 : "+buyUsb+"<br>")

*/
