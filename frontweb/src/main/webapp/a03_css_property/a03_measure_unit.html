<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	<style type="text/css">
/*
# css3에서 크기나 범위를 나타날 때, 사용되는 표준 단위
1. 보통 text-size:20pt; 등과 같이 속성과 단위를 지정하여 글자의 크기,
	border의 굵기, margin의 크기등을 많이 사용하는데, css에서 가장 많이
	쓰는 방식이 %형(상대적 크기지정), pt/px(절대적 크기)로 사용된다.
2. 주요 표준 단위 내용
	em : 배수  ex) font-size:3em; - 현재 폰트의 3배 크기
	% : 퍼센트 ex) font-size:500%; - 현재 폰트의 500% 크기
	----------------------------------------------
	px : 픽셀 수 ex) font-size:10px; - 10픽셀 크기
	cm : 센티미터 ex) margin-left:5cm; - 왼쪽 여백 5cm
	mm  : 밀리미터 ex) margin-left:10mm; - 왼쪽 여백 10mm
	in : 인치, 1in = 2.54cm=96px ex) margin-left:2in - 왼쪽 여백 2인치
	pt : 포인터, 1pt = 1 in의 1/72 크기 ex) margin-left:20 pt -왼쪽 여백20포인터
	pc : 피카소, 1pc = 12pt  ex) font-size:1pc - 1크기 폰트
	deg :각도,    ex) transform:rotate(20deg); - 시계방향으로 20도 회전
3. html5에서는 단위를 사용하지 않으면 css 스타일 오류
	1) font-size:3; - 오류
	2) font-size:3px; - 정상	

*/
	
	</style>

</head>
<body>

</body>
</html>
