<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	<style type="text/css">
/*
# 예제
1. border-style : 보더의 종류에 대한 옵션
2. border-color : 보더의 색상에 대한 옵션
3. border-width : 보더의 굵기 옵션
4. padding : 글자와 보더와의 간격 설정
5. margin : 외부 다른 요소와 간격 설정..
*/
		body{background:ghostwhite;}
		span{background:deepskyblue;}
		div.box{
			background:yellow;
			border-style:solid;
			border-color:peru;
			
			margin:40px;
			border-width:30px;
			padding:20px;
		}
	
	</style>

</head>
<body>
	<div class="box">
		<span>안녕하세요!(보더연습)</span>
	</div>
</body>
</html>
