<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
	</head>
	<body>
	
	</body>
	<script type="text/javascript">
	// DOM객체(태그를 객체화 해서 처리)로 출력
	var bodyObj = document.body
	bodyObj.innerText = "출력할 내용"
	// .innerText : 출력할 내용을 처리하는 속성
	// .innerHTML : 태그가 적용되는 속성
	document.body.innerHTML = "<h2>반가워요</h2>"
// ex) 위 2가지 속성을 이용해서 좋아하는 과일과 가격을 출력하세요.\
    bodyObj.innerText = "좋아하는 과일:사과"
    document.body.innerHTML += "<h2>과일의 가격:3000원</h2>"
    //  += : 누적 처리..
    
	
	
	
	
	
	
	
	
	
	
	
	</script>
</html>
