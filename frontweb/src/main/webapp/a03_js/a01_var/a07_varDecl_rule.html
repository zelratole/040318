<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<h2>변수 선언 규칙</h2>



</body>
<script type="text/javascript">
/* 
# 변수는 식별자(identifier)로 식별하는 규칙을 지켜야지 정상적으로
처리할 수 있다.
1. 식별자 만드는 규칙
	1) 첫번째 문자는 알파벳, 언더스코어, $ 문자로만 사용할 수 있다.
		ex) 한글, 특수 문자, 숫자는 첫번째 변수 선언 문자로
		사용할 수 없다.
		var 과일 = "사과" (X)
		var 25Age = 30 (X)  
		var _num1 = 25 (O)
		var $loc = "서울" (O)
		var #nation = "대한민국" (X)
*/
// var 25Age = 30 첫번째 문자는 영문으로 시작하여야 한다.
var 과일 = "사과" 
// 한글변수가 선언될 수 있으나, 프로그래밍에서는 활용하지 않는다.
// 1. 에러의 소지 있기 때문에(1byte유형의 데이터 변수)
var name_01 = "홍길동" // 허용되는 특수문자 _
var $age = 25 // 허용되는 특수문자 $
//var #nation = "한국" 그외 특수문자는 허용되지 않는다.
document.write("이름:"+name_01)
document.write(", 나이:"+$age+"<br>")

// ex) $, _ 활용해서 좋아하는 취미와 생일을 할당하는 변수를 선언하고,
//    출력하세요..
var my_hobby = "음악감상"
var $goto_school = "프로그래밍을 배우러 가다"
var $birthday = "2024-03-14"
document.write("나의 취미:"+my_hobby+"<br>")
document.write("나의 생일:"+$birthday+"<br>")
document.write("기타 변수 선언:"+$goto_school)

		
		
		


</script>
</html>
