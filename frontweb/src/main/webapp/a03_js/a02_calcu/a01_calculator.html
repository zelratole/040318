<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<h2>자바스크립트에서 사용하는 연산자</h2>



</body>
<script type="text/javascript">
/* 
# 연산자
1. 자바스크립트에서는 데이터의 증감과 대입, 비교, 논리를 처리하기 위한
	연산자를 사용한다.
2. 연산자의 종류
	1) 산술연산자 : 데이터를 덧셈, 뺄셈, 곱셈, 나눗셈, 나머지을 처리하는 연산자
		25 + 30, 30-5, 5*7, 10/2(몫), 10%3(나머지값) 
	2) 증감연산자 : 데이터를 증가/감소 처리하는 연산자
		var no = 1
		no++ : 데이터 1증가
		no-- : 데이터 1감소
	
*/
var num01 = 25
var num02 = 4
document.write( num01 + num02  +"<br>")
document.write( num01 - num02 + "<br>")
document.write( num01 * num02 + "<br>")
document.write( num01 / num02 + "<br>")
// parseInt : 정수값을 처리하는 함수
document.write(parseInt(num01/num02) + "<br>")

document.write( num01 % num02 + "<br>")
document.write("<h3>증감연산자</h3>")
var no = 1
document.write("초기 번호 :"+no+ "<br>")
no++
document.write("증가 후 번호 :"+no+ "<br>")
no++
document.write("증가 후 번호 :"+no+ "<br>")
no++
document.write("증가 후 번호 :"+no+ "<br>")
no--
document.write("감소 후 번호 :"+no+ "<br>")
no--
document.write("감소 후 번호 :"+no+ "<br>")
no--
document.write("감소 후 번호 :"+no+ "<br>")







</script>
</html>
